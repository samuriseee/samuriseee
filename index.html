<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./S-gr/first vuejs/todolist.css">
    <link href="https://fonts.googleapis.com/css2?family=Hachi+Maru+Pop&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.2/css/all.min.css">
    <title>Document</title>
</head>
<body>
    <div class="container">
        <h1>To Do List</h1>
            <div id="app">
                <div v-if="!isEditing"> 
                        <input type="text" v-model="newTodo" @keyup.enter="storeTodo"
                                placeholder="What need to be done?" 
                                
                        >
                        <input type="submit" value="+" @click="storeTodo">
                </div>

                <div v-else> 
                        <input type="text" v-model="newTodo" @keyup.enter="updateTodo"
                                placeholder="Editing your task here"
                        >
                        <input type="submit" value="↻" @click="updateTodo">
                </div>
                
                <ol>
                    <li v-for="(todo,index) in todos" :class="{ completed : todo.completed }">
                        <input type="checkbox" v-model="todo.completed" class="checkbox">
                                {{ todo.name }}  
                    <div> 
                        <button v-on:click="editTodo(index,todo)"><i class="far fa-edit"></i>
                        </button>     
                        <button v-on:click="deleteTodo(index)"><i class="far fa-trash-alt"></i>
                        </button> 
                    </div>
                    </li>
                </ol>
                <div class="clearButton"> 
                    <button v-on:click="clearCompleted"> Clear Completed </button>
                    <button v-on:click="clearAll"> Clear All Tasks</button>
                </div>

                <div class="pending"> 
                        Pending Tasks: {{ remaining }}
                </div>
            </div>
                <div class="footer">
                    <div class="wave"></div>
                </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/vue@2.6.12/dist/vue.js"></script>
    <script src="./S-gr/first vuejs/todolist.js"></script>
</body>
</html>
