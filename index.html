<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div id="app">
        <div class="container">
            <h1>To Do List</h1>
            <div v-if="!isEditing"> 
                    <input type="text" v-model="todo">
                    <input type="submit" value="add" v-on:click="storeTodo">
            </div>

            <div v-else> 
                    <input type="text" v-model="todo">
                    <input type="submit" value="update" v-on:click="updateTodo">
            </div>
            
            <ol>
                 
                <li v-for="(todo,index) in todos">
                    {{ todo.name }}    
                    <button v-on:click="editTodo(index,todo)">edit</button>     
                    <button v-on:click="deleteTodo(index)">delete</button> 
                </li>
            </ol>
            <button v-on:click="clearCompleted"> Clear completed </button>
            <button v-on:click="clearAll"> Clear All </button>
            <div> 
                Pending Tasks: {{ inComplete }}
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/vue@2.6.12/dist/vue.js"></script>
    <script>
        new Vue ({
        el : '#app',
        data :{
            isEditing: false,
            sedlectedIndex: null,
            todo: '',
            todos: [
                {
                    name:'sleep',
                    completed: true,
                },

                {
                    
                    name:'eat',
                    completed: true,
                },
        
                {
                    
                    name:'reach challenger',
                    completed: false,
                },

                {
                    
                    name:'do exercise',
                    completed: true,
                },
            ],
        },

        methods: {
            storeTodo() {
                this.todos.push(this.todo)
                this.todo=''
            },

            editTodo(index,todo) {
                this.todo = todo.name
                this.selectedIndex = index
                this.isEditing = true
            },

            updateTodo() {
                this.todos.splice(this.sedlectedIndex,1,this.todo)
                this.isEditing = false
                this.todo=''
            },

            deleteTodo(index) {
                this.todos.splice(index,1)
                this.todo=''
            },

            inProgress(todo) {
                return !this.isCompleted(todo)
            },
            isCompleted(todo) {
                return todo.completed
            },
            clearCompleted() {
                this.todos = this.todos.filter(this.inProgress)
            },
            clearAll() {
                this.todos=[]
            },
            
        }
    })
    </script>
</body>
</html>
