<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./buoi8.css">
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@200&display=swap" rel="stylesheet">
   
   
</head>
<body>
    <h1> Bài tập Js </h1>
    <div class="container">
      
        <div class="name"> 
            Name: <input placeholder="Item Name" id="itemName"> 
            <p id="invalid"></p>
        </div>
        
        <div> 
            Category:
        <select id="Category">
            <option value="Category 0"> No Selected </option>
            <option value="Category 1"> Category 1 </option>
            <option value="Category 2"> Category 2 </option>
            <option value="Category 3"> Category 3 </option>
        </select>
            <p id="invalid2"></p>
        </div>
            <div class="wrap">
            <input type="file" id="myfile" onchange="readURL(this);">  
                <label for="myfile"></label>
                <img id="idimg" class="previewimg" accept="image/png, image/jpeg"> 
                
            </div>
        <div class="three-button"> 
            <button onclick="addHTMLTableRow()" class="submit"> Submit </button>
            <button onclick="editHtmlTbleSelectedRow()" class="edit"> Edit </button>
            <button onclick="removeSelectedRow()" class="delete"> Delete </button>
        </div>
    </div>
    
        <div class="tab tab-1">
            <table id="table" border="1">
                <thead> 
                        <tr>
                            <th> # </th>
                            <th> Name </th>
                            <th> Categories </th>
                            <th> Image </th>
                        </tr>
                </thead>
            </table>
        </div>
        
    </div>
     
            <script src="./buoi8.js"> </script>
    
            
    
</body>
</html>
